    <input type="text" id="input">

    <h3 class="select-device">Select your device</h3>

        <option disabled selected>Choose Your Device</option>

        <option value="mi">Xiomi</option>

        <option value="apple">Apple iPhone</option>

        <option value="oppo">0ppo</option>
    </select>

    <h1 class="keyword">Start Typing</h1>


    <div id="main">
        <label for="input2" class="file-upload-btn">Choose File</label>
        <input type="file" id="input2" accept="*/*">
        <!-- <div id="file-name">Uploaded File</div> -->
    </div>

    <div class="input_form">
        <h3>Fill this form to get a free gift</h3>

        <form action="">
            <input class="input" required placeholder="name" type="text">
            <input class="input" placeholder="email" type="email">
            <input class="input" placeholder="phone no." type="tel">
            <input type="submit">
        </form>

        <div class="card">
            <h2>Your Card</h2>
            <h4>Name : </h4>
            <h4>Email : </h4>
            <h4>Phone No. : </h4>
        </div>

    </div>
    <div class="mouse-position">
        <h4>Move Mouse Here</h4>
    </div>


    <div class="character-counter">
        <!-- <div class="character-counter-content"> -->
        <h3>Character Counter</h3>
        <input type="text" id="character-input">
        <p id="character-count">Total Characters: <span></span></p>

    </div>
